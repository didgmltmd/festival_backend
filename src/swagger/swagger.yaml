openapi: 3.0.0
info:
  title: Festival Backend API
  version: 1.0.0
  description: Festival order, kitchen, menu, and sales API.
tags:
  - name: Menu
  - name: Orders
  - name: Kitchen
  - name: Sales
paths:
  /api/menu:
    get:
      tags: [Menu]
      summary: List menu items
      responses:
        "200":
          description: Menu items
    post:
      tags: [Menu]
      summary: Add a menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItem"
      responses:
        "201":
          description: Created
  /api/menu/{index}:
    put:
      tags: [Menu]
      summary: Update a menu item by list index
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
    delete:
      tags: [Menu]
      summary: Delete a menu item by list index
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
  /api/orders:
    get:
      tags: [Orders]
      summary: List orders
      responses:
        "200":
          description: Orders
    post:
      tags: [Orders]
      summary: Calculate an order from menu data
      responses:
        "200":
          description: Calculated order
  /api/orders/complete:
    post:
      tags: [Orders]
      summary: Save an order and emit kitchen events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "201":
          description: Saved
  /api/orders/{timestamp}/serve:
    patch:
      tags: [Orders]
      summary: Mark an entire order as served
      parameters:
        - name: timestamp
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Served
  /api/orders/{timestamp}/{itemIndex}/serve:
    patch:
      tags: [Orders]
      summary: Mark a single order item as served
      parameters:
        - name: timestamp
          in: path
          required: true
          schema:
            type: string
        - name: itemIndex
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Served
  /api/orders/{timestamp}:
    delete:
      tags: [Orders]
      summary: Delete an order
      parameters:
        - name: timestamp
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
  /api/kitchen/{zone}:
    get:
      tags: [Kitchen]
      summary: List kitchen items by zone
      parameters:
        - name: zone
          in: path
          required: true
          schema:
            type: string
            enum: [A, B, C]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, completed]
      responses:
        "200":
          description: Kitchen items
  /api/kitchen/{timestamp}/{itemIndex}/serve:
    patch:
      tags: [Kitchen]
      summary: Complete one kitchen item
      parameters:
        - name: timestamp
          in: path
          required: true
          schema:
            type: string
        - name: itemIndex
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completed
  /api/sales/summary:
    get:
      tags: [Sales]
      summary: Sales summary by menu item
      responses:
        "200":
          description: Sales summary
components:
  schemas:
    MenuItem:
      type: object
      required: [name, price, zone]
      properties:
        name:
          type: string
        price:
          type: integer
        zone:
          type: string
          enum: [A, B, C]
    OrderItem:
      type: object
      properties:
        name:
          type: string
        price:
          type: integer
        quantity:
          type: integer
        zone:
          type: string
          enum: [A, B, C]
        total:
          type: integer
        served:
          type: boolean
    Order:
      type: object
      properties:
        tableNumber:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalPrice:
          type: integer
        timestamp:
          type: string
          format: date-time
        served:
          type: boolean
